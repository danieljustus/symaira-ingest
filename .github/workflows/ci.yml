name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build CGO-free binary
        run: CGO_ENABLED=0 go build ./cmd/symingest

      - name: Verify CLI help
        run: ./symingest --help

  macos-client:
    name: macOS client build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build embedded symingest binary
        run: go build -o symingest ./cmd/symingest

      - name: Generate Xcode project
        run: xcodegen --spec client/project.yml

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -project client/Symingest.xcodeproj \
            -scheme Symingest \
            -resolvePackageDependencies

      - name: Build macOS app
        run: |
          xcodebuild -project client/Symingest.xcodeproj \
            -scheme Symingest \
            -configuration Release \
            -derivedDataPath build_dd \
            -destination 'platform=macOS' \
            build
